# LOCAL deployment — mirrors the Railway topology (qdrant + api + streamlit)
# wired together via QDRANT_HOST / RAG_API_URL, the same knobs used on Railway.
# Railway deployment is configured separately under docker/railway/.
#
#   docker compose up -d --build
#   API   -> http://localhost:8000/docs
#   UI    -> http://localhost:8501
services:
  qdrant:
    build:
      context: .
      dockerfile: docker/local/Dockerfile.qdrant
    image: rag-qdrant:local
    container_name: qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"  # REST API
      - "6334:6334"  # gRPC
    volumes:
      - qdrant_storage:/qdrant/storage

  rag-api:
    build:
      context: .
      dockerfile: docker/railway/Dockerfile.api
    container_name: rag-api
    restart: unless-stopped
    depends_on:
      - qdrant
    ports:
      - "8000:8000"
    environment:
      PORT: "8000"
      # Consistent with Railway: the app is fully config-driven.
      QDRANT_HOST: "http://qdrant:6333"
      QDRANT_COLLECTION: "${QDRANT_COLLECTION:-book}"
      OLLAMA_HOST: "${OLLAMA_HOST}"
      OLLAMA_EMBEDDING_MODEL: "${OLLAMA_EMBEDDING_MODEL}"
      OLLAMA_GENERATION_MODEL: "${OLLAMA_GENERATION_MODEL}"
      LANGCHAIN_TRACING_V2: "${LANGCHAIN_TRACING_V2:-}"
      LANGCHAIN_API_KEY: "${LANGCHAIN_API_KEY:-}"
      LANGCHAIN_PROJECT: "${LANGCHAIN_PROJECT:-rag-tut}"

  streamlit:
    build:
      context: .
      dockerfile: docker/railway/Dockerfile.streamlit
    container_name: rag-streamlit
    restart: unless-stopped
    depends_on:
      - rag-api
    ports:
      - "8501:8501"
    environment:
      PORT: "8501"
      RAG_API_URL: "http://rag-api:8000"

volumes:
  qdrant_storage:
